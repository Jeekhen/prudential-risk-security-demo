command:
  - uvicorn
  - main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000
env:
  - name: MODEL_SERVING_ENDPOINT
    value: demo-fraud-scoring
  - name: VS_ENDPOINT
    value: demo-vs-endpoint
  - name: CATALOG
    value: users
  - name: SCHEMA
    value: jk_wong
resources:
  - name: sql-warehouse
    sql_warehouse:
      permission: CAN_USE
  - name: model-serving
    serving_endpoint:
      name: demo-fraud-scoring
      permission: CAN_QUERY
