<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Risk &amp; Security Demo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                       */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --border: #e2e6ed;
      --text: #1a1d23;
      --text-secondary: #5f6b7a;
      --primary: #1b5e8a;
      --primary-light: #e8f2fa;
      --accent: #d4380d;
      --green: #15803d;
      --green-bg: #dcfce7;
      --yellow: #a16207;
      --yellow-bg: #fef9c3;
      --orange: #c2410c;
      --orange-bg: #ffedd5;
      --red: #b91c1c;
      --red-bg: #fee2e2;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                             */
    /* ------------------------------------------------------------------ */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .app-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    .app-header .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .tabs {
      display: flex;
      gap: 0;
      margin: 24px 32px 0;
    }
    .tab-btn {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .tab-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .tab-content {
      padding: 24px 32px 48px;
      max-width: 1200px;
    }

    /* ------------------------------------------------------------------ */
    /* Cards                                                              */
    /* ------------------------------------------------------------------ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ------------------------------------------------------------------ */
    /* Form elements                                                      */
    /* ------------------------------------------------------------------ */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .form-group select,
    .form-group input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
    }
    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: #154a6e; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    /* ------------------------------------------------------------------ */
    /* Score gauge                                                        */
    /* ------------------------------------------------------------------ */
    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
    }
    .gauge-svg { width: 200px; height: 120px; }
    .gauge-score {
      font-size: 36px;
      font-weight: 800;
      margin-top: -8px;
    }
    .gauge-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ------------------------------------------------------------------ */
    /* Badges                                                             */
    /* ------------------------------------------------------------------ */
    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-low { background: var(--green-bg); color: var(--green); }
    .badge-medium { background: var(--yellow-bg); color: var(--yellow); }
    .badge-high { background: var(--orange-bg); color: var(--orange); }
    .badge-critical { background: var(--red-bg); color: var(--red); }

    .impact-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .impact-high { background: var(--red); }
    .impact-medium { background: var(--orange); }
    .impact-low { background: var(--green); }

    /* ------------------------------------------------------------------ */
    /* Risk factor list                                                   */
    /* ------------------------------------------------------------------ */
    .rf-list { list-style: none; }
    .rf-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .rf-item:last-child { border-bottom: none; }
    .rf-item .rf-name { font-weight: 600; font-size: 14px; }
    .rf-item .rf-desc { font-size: 13px; color: var(--text-secondary); }

    /* ------------------------------------------------------------------ */
    /* Chat                                                               */
    /* ------------------------------------------------------------------ */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 200px);
      min-height: 500px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    .sources-toggle {
      font-size: 12px;
      color: var(--primary);
      cursor: pointer;
      margin-top: 8px;
      font-weight: 600;
      user-select: none;
    }
    .sources-list {
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .source-item {
      padding: 6px 0;
      border-bottom: 1px dashed var(--border);
    }
    .source-item:last-child { border-bottom: none; }
    .source-name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .chat-input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }
    .chat-input-row input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .chat-input-row button {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .chat-input-row button:disabled { opacity: .55; cursor: not-allowed; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .chip {
      padding: 6px 14px;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid transparent;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .chip:hover {
      background: var(--primary);
      color: #fff;
    }

    /* ------------------------------------------------------------------ */
    /* Spinner                                                            */
    /* ------------------------------------------------------------------ */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .typing-dots::after {
      content: '';
      animation: dots 1.4s steps(4,end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* ------------------------------------------------------------------ */
    /* Results layout                                                     */
    /* ------------------------------------------------------------------ */
    .results-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    /* Error */
    .error-box {
      padding: 12px 16px;
      background: var(--red-bg);
      color: var(--red);
      border-radius: 6px;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ================================================================== */
    /* Gauge component                                                    */
    /* ================================================================== */
    function ScoreGauge({ score }) {
      const color = score < 25 ? '#15803d'
                  : score < 50 ? '#a16207'
                  : score < 75 ? '#c2410c'
                  : '#b91c1c';

      // Arc from 180 to 0 degrees (left to right semicircle)
      const pct = Math.min(score, 100) / 100;
      const startAngle = Math.PI;
      const endAngle = Math.PI - pct * Math.PI;
      const cx = 100, cy = 105, r = 80;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = pct > 0.5 ? 1 : 0;

      return (
        <div className="gauge-wrap">
          <svg className="gauge-svg" viewBox="0 0 200 120">
            {/* Background arc */}
            <path d={`M 20 105 A 80 80 0 0 1 180 105`}
                  fill="none" stroke="#e2e6ed" strokeWidth="14" strokeLinecap="round"/>
            {/* Score arc */}
            {score > 0 && (
              <path d={`M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`}
                    fill="none" stroke={color} strokeWidth="14" strokeLinecap="round"/>
            )}
          </svg>
          <div className="gauge-score" style={{ color }}>{score}</div>
          <div className="gauge-label">Fraud Risk Score</div>
        </div>
      );
    }

    /* ================================================================== */
    /* Tab 1: Fraud Scoring                                               */
    /* ================================================================== */
    function FraudScoring() {
      const [form, setForm] = useState({
        claim_type: 'medical',
        claim_amount_hkd: 50000,
        region: 'Hong Kong Island',
        provider_type: 'hospital',
        submission_channel: 'online_portal',
        processing_days: 14,
        provider_flagged_pct: 5,
      });
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const handleChange = (field) => (e) => {
        const val = e.target.type === 'number' ? parseFloat(e.target.value) || 0 : e.target.value;
        setForm({ ...form, [field]: val });
      };

      const submit = async () => {
        setLoading(true);
        setError(null);
        try {
          const resp = await fetch('/api/score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          setResult(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const badgeClass = result
        ? `badge badge-${result.risk_category}`
        : '';

      return (
        <div>
          <div className="card">
            <h2>Submit Claim for Fraud Analysis</h2>
            <div className="form-grid">
              <div className="form-group">
                <label>Claim Type</label>
                <select value={form.claim_type} onChange={handleChange('claim_type')}>
                  {['medical','travel','motor','property','life'].map(v => (
                    <option key={v} value={v}>{v.charAt(0).toUpperCase()+v.slice(1)}</option>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Claim Amount (HKD)</label>
                <input type="number" min="0" step="1000" value={form.claim_amount_hkd} onChange={handleChange('claim_amount_hkd')}/>
              </div>
              <div className="form-group">
                <label>Region</label>
                <select value={form.region} onChange={handleChange('region')}>
                  {['Hong Kong Island','Kowloon','New Territories','Macau'].map(v => (
                    <option key={v} value={v}>{v}</option>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Provider Type</label>
                <select value={form.provider_type} onChange={handleChange('provider_type')}>
                  {['hospital','clinic','specialist','pharmacy','dental','physiotherapy','optical','repair_shop','legal','lab'].map(v => (
                    <option key={v} value={v}>{v.replace('_',' ').replace(/\b\w/g,l=>l.toUpperCase())}</option>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Submission Channel</label>
                <select value={form.submission_channel} onChange={handleChange('submission_channel')}>
                  {['online_portal','mobile_app','branch','agent','email'].map(v => (
                    <option key={v} value={v}>{v.replace('_',' ').replace(/\b\w/g,l=>l.toUpperCase())}</option>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Processing Days</label>
                <input type="number" min="1" max="90" value={form.processing_days} onChange={handleChange('processing_days')}/>
              </div>
              <div className="form-group">
                <label>Provider Flagged Claims %</label>
                <input type="number" min="0" max="80" step="0.5" value={form.provider_flagged_pct} onChange={handleChange('provider_flagged_pct')}/>
              </div>
            </div>
            <button className="btn-primary" onClick={submit} disabled={loading}>
              {loading ? <><span className="spinner"></span> Scoring...</> : 'Analyse Claim'}
            </button>
            {error && <div className="error-box">Error: {error}</div>}
          </div>

          {result && (
            <div className="results-grid">
              <div className="card" style={{ textAlign: 'center' }}>
                <ScoreGauge score={result.fraud_score} />
                <div style={{ marginTop: 12 }}>
                  <span className={badgeClass}>{result.risk_category}</span>
                </div>
              </div>
              <div className="card">
                <h2>Key Risk Factors</h2>
                <ul className="rf-list">
                  {result.risk_factors.map((rf, i) => (
                    <li key={i} className="rf-item">
                      <span className={`impact-dot impact-${rf.impact}`}></span>
                      <div>
                        <div className="rf-name">{rf.factor}</div>
                        <div className="rf-desc">{rf.description}</div>
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ================================================================== */
    /* Tab 2: Compliance Copilot                                          */
    /* ================================================================== */
    const STARTERS = [
      "What are the fraud escalation thresholds?",
      "What is the incident response SLA for critical security incidents?",
      "What are the data breach notification requirements?",
      "What documentation is needed for motor claims?",
    ];

    function ComplianceCopilot() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const messagesEnd = useRef(null);

      useEffect(() => {
        messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const sendMessage = async (text) => {
        if (!text.trim() || loading) return;
        const userMsg = { role: 'user', content: text.trim() };
        const newMsgs = [...messages, userMsg];
        setMessages(newMsgs);
        setInput('');
        setLoading(true);

        try {
          const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text.trim(),
              history: newMsgs.filter(m => !m.sources), // strip sources from history
            }),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          setMessages([...newMsgs, {
            role: 'assistant',
            content: data.answer,
            sources: data.sources,
          }]);
        } catch (e) {
          setMessages([...newMsgs, {
            role: 'assistant',
            content: `Sorry, an error occurred: ${e.message}`,
            sources: [],
          }]);
        } finally {
          setLoading(false);
        }
      };

      const handleKey = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(input);
        }
      };

      return (
        <div className="card chat-container">
          <h2>Compliance &amp; Risk Policy Assistant</h2>

          {messages.length === 0 && (
            <div style={{ padding: '24px 0' }}>
              <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 12 }}>
                Ask a question about risk policies, fraud procedures, or regulatory requirements:
              </p>
              <div className="chips">
                {STARTERS.map((q, i) => (
                  <span key={i} className="chip" onClick={() => sendMessage(q)}>{q}</span>
                ))}
              </div>
            </div>
          )}

          <div className="chat-messages">
            {messages.map((m, i) => (
              <ChatBubble key={i} message={m} />
            ))}
            {loading && (
              <div className="chat-bubble assistant">
                <span className="typing-dots">Thinking</span>
              </div>
            )}
            <div ref={messagesEnd} />
          </div>

          <div className="chat-input-row">
            <input
              placeholder="Ask about risk policies, compliance, or claims procedures..."
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKey}
              disabled={loading}
            />
            <button onClick={() => sendMessage(input)} disabled={loading || !input.trim()}>
              Send
            </button>
          </div>
        </div>
      );
    }

    function ChatBubble({ message }) {
      const [showSources, setShowSources] = useState(false);
      const hasSources = message.sources && message.sources.length > 0
                         && !(message.sources.length === 1 && message.sources[0].source === 'System');

      return (
        <div className={`chat-bubble ${message.role}`}>
          {message.content}
          {message.role === 'assistant' && hasSources && (
            <>
              <div className="sources-toggle" onClick={() => setShowSources(!showSources)}>
                {showSources ? 'Hide' : 'Show'} sources ({message.sources.length})
              </div>
              {showSources && (
                <div className="sources-list">
                  {message.sources.map((s, i) => (
                    <div key={i} className="source-item">
                      <div className="source-name">{s.source}</div>
                      <div>{s.content.length > 200 ? s.content.slice(0, 200) + '...' : s.content}</div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    /* ================================================================== */
    /* App shell                                                          */
    /* ================================================================== */
    function App() {
      const [tab, setTab] = useState('fraud');

      return (
        <div>
          <header className="app-header">
            <div>
              <h1>Insurance Risk &amp; Security Demo</h1>
              <div className="subtitle">AI-powered fraud detection and compliance assistant</div>
            </div>
          </header>

          <div className="tabs">
            <button className={`tab-btn ${tab === 'fraud' ? 'active' : ''}`}
                    onClick={() => setTab('fraud')}>
              Fraud Scoring
            </button>
            <button className={`tab-btn ${tab === 'chat' ? 'active' : ''}`}
                    onClick={() => setTab('chat')}>
              Compliance Copilot
            </button>
          </div>

          <div className="tab-content">
            {tab === 'fraud' ? <FraudScoring /> : <ComplianceCopilot />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
